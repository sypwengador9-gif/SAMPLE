<!DOCTYPE html>
<html>
<head>

<title>L&D Training Form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.container-box{
max-width:900px;
margin:auto;
margin-top:40px;
}

.card{
border-radius:10px;
}

.header-title{
text-align:center;
font-weight:bold;
margin-bottom:20px;
}

.addBtn{
background:#0d6efd;
color:white;
border:none;
}

.submitBtn{
background:#198754;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="container container-box">

<div class="card shadow">

<div class="card-body">

<h3 class="header-title">HRMO Learning & Development Intervention Form</h3>

<form id="form">

<!-- Employee Information -->
<h5 class="mb-3">Employee Information</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Employee Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Position</label>
<input type="text" name="position" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Sex / Gender</label>
<select name="sex" class="form-select">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">PWD / IP</label>
<input type="text" name="pwdip" class="form-control">
</div>

</div>

<hr>

<!-- L&D Table -->
<h5 class="mb-3">L & D Interventions</h5>

<div class="table-responsive">

<table class="table table-bordered">

<thead class="table-light">
<tr>
<th>L&D Intervention</th>
<th>Inclusive Date</th>
<th>Training Hours</th>
<th>Type</th>
<th>Conducted By</th>
</tr>
</thead>

<tbody id="ldContainer">

<tr>
<td><input type="text" name="intervention[]" class="form-control"></td>
<td><input type="date" name="date[]" class="form-control"></td>
<td><input type="number" name="hours[]" class="form-control"></td>
<td>
<select name="type[]" class="form-select">
<option value="">Select</option>
<option>Technical</option>
<option>Foundational</option>
<option>Managerial</option>
</select>
</td>
<td><input type="text" name="conducted[]" class="form-control"></td>
</tr>

</tbody>

</table>

</div>

<button type="button" class="btn addBtn" onclick="addLD()">+ Add L & D</button>

<br><br>

<button type="submit" class="btn submitBtn">Submit</button>

</form>

<p id="status" class="mt-3 text-success"></p>

</div>
</div>
</div>


<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby56ZfEfMV7C1AL7gKNvpce0WAEHuOG7dwHu-GBGQctnqvRJGNBlNJ5mTvE3T0wWl-2/exec";

function addLD(){

const container = document.getElementById("ldContainer");

const row = document.createElement("tr");

row.innerHTML = `
<td><input type="text" name="intervention[]" class="form-control"></td>
<td><input type="date" name="date[]" class="form-control"></td>
<td><input type="number" name="hours[]" class="form-control"></td>
<td>
<select name="type[]" class="form-select">
<option value="">Select</option>
<option>Technical</option>
<option>Foundational</option>
<option>Managerial</option>
</select>
</td>
<td><input type="text" name="conducted[]" class="form-control"></td>
`;

container.appendChild(row);

}


const form = document.getElementById("form");

form.addEventListener("submit", e => {

e.preventDefault();

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})
.then(res=>{
document.getElementById("status").innerHTML="✔ Submitted Successfully!";
form.reset();
})
.catch(err=>console.log(err));

});

</script>

</body>
</html>
